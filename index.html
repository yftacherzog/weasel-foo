<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dawkins' Weasel Program Simulation</title>
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            margin: 0;
        }
        .container {
            max-width: 700px;
            width: 100%;
            background: #1e293b;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.3);
        }
        h1 { margin-top: 0; color: #38bdf8; text-align: center; }
        .config-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 25px;
        }
        label { font-size: 14px; color: #94a3b8; font-weight: 600; }
        input[type="text"] {
            background: #0f172a;
            border: 2px solid #334155;
            color: #fff;
            padding: 12px;
            font-size: 16px;
            border-radius: 6px;
            text-transform: uppercase;
            font-family: monospace;
        }
        input:focus { border-color: #38bdf8; outline: none; }
        
        .stats-bar {
            display: flex;
            justify-content: space-around;
            background: #0f172a;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 25px;
            font-family: monospace;
            font-size: 16px;
        }
        .stat span { color: #38bdf8; font-weight: bold; }

        .string-display {
            font-family: 'Courier New', Courier, monospace;
            font-size: 28px;
            font-weight: bold;
            letter-spacing: 4px;
            text-align: center;
            background: #0f172a;
            padding: 25px;
            border-radius: 8px;
            margin-bottom: 25px;
            min-height: 35px;
            word-break: break-all;
        }
        .match { color: #4ade80; text-shadow: 0 0 8px rgba(74,222,128,0.4); }
        .mismatch { color: #64748b; }

        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 15px;
        }
        button {
            padding: 14px;
            font-size: 15px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            border: none;
            transition: background 0.2s;
        }
        .btn-random { background: #ef4444; color: white; }
        .btn-random:hover { background: #dc2626; }
        .btn-weasel { background: #10b981; color: white; }
        .btn-weasel:hover { background: #059669; }
        
        .auto-box {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            background: #334155;
            padding: 12px;
            border-radius: 6px;
            cursor: pointer;
        }
        .auto-box input { cursor: pointer; width: 18px; height: 18px; }
    </style>
</head>
<body>

<div class="container">
    <h1>The Weasel Program</h1>
    
    <div class="config-group">
        <label for="target-input">Target Phrase (Letters & Spaces Only)</label>
        <input type="text" id="target-input" value="METHINKS IT IS LIKE A WEASEL" maxlength="50">
    </div>

    <div class="stats-bar">
        <div class="stat">Step: <span id="stat-steps">0</span></div>
        <div class="stat">Fitness: <span id="stat-fitness">0/0</span></div>
        <div class="stat">Mode: <span id="stat-mode">None</span></div>
    </div>

    <div class="string-display" id="string-output"></div>

    <div class="controls">
        <button class="btn-random" id="btn-random">Pure Random Step</button>
        <button class="btn-weasel" id="btn-weasel">Weasel Step (x100 Copies)</button>
    </div>

    <label class="auto-box" for="auto-run">
        <input type="checkbox" id="auto-run">
        <span>Auto-Run Weasel Algorithm</span>
    </label>
</div>

<script src="app.js"></script>
</body>
</html>
